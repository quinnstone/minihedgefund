name: Parse actual entries

# Fires only on changes to data/actual_entries.txt — won't trigger on any
# other commit, including the weekly digest's data commits.
on:
  push:
    branches: [main]
    paths:
      - 'data/actual_entries.txt'
  workflow_dispatch:

# Avoid racing with the weekly digest's commit-back step. They both touch
# data/ and the main branch; sequential is safer than parallel.
concurrency:
  group: actual-book-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Only what the rebuild script needs — no Anthropic, no agents.
          pip install yfinance>=0.2.40 requests>=2.31.0 python-dotenv>=1.0.0

      - name: Rebuild actual_book.json
        id: rebuild
        run: python -m scripts.rebuild_actual_book | tee /tmp/rebuild.log

      - name: Commit if changed
        if: always()
        run: |
          git config user.name "minihedgefund-bot"
          git config user.email "bot@minihedgefund.invalid"
          if [[ -n "$(git status --porcelain data/actual_book.json 2>/dev/null)" ]]; then
            git add data/actual_book.json
            git commit -m "data: rebuild actual_book.json $(date -u +%Y-%m-%d) [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "actual_book.json committed"
          else
            echo "actual_book.json unchanged — nothing to commit"
          fi

      - name: Notify Discord on success
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          SUMMARY=$(tail -10 /tmp/rebuild.log | sed 's/"/\\"/g' | tr '\n' '\\n')
          BODY=$(cat <<EOF
          {"embeds":[{
            "title": "✅ Actual book updated",
            "description": "\`\`\`\n${SUMMARY}\n\`\`\`",
            "color": 3066993
          }]}
          EOF
          )
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$BODY" || true

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(cat <<EOF
          {"embeds":[{
            "title": "❌ actual_entries.txt parse failed",
            "description": "Workflow [run #${{ github.run_id }}](${GH_RUN_URL}) couldn't rebuild actual_book.json. Check the log; the bad line is usually surfaced as a 'WARN line N' message in the rebuild step.",
            "color": 13382451
          }]}
          EOF
          )
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$BODY" || true
