name: Weekly Digest

# Two crons because GitHub Actions cron is UTC with no DST awareness.
# Exactly one will be 10:00 ET each Monday; the other no-ops via the
# Python ET-gate inside src/main.py.
on:
  schedule:
    - cron: '0 14 * * 1'   # 10am ET during EDT (Mar–early Nov)
    - cron: '0 15 * * 1'   # 10am ET during EST (early Nov–Mar)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the full pipeline but don't post to Discord"
        type: boolean
        default: false
      force:
        description: "Skip the Monday-10am-ET gate (run regardless of day/time)"
        type: boolean
        default: false

# Prevent the two crons from racing if one ever overlaps the other.
concurrency:
  group: weekly-digest
  cancel-in-progress: false

permissions:
  contents: write   # required to commit data/ back to the repo

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REDDIT_USER_AGENT: "MiniHedgeFund/1.0 (by /u/quinnstone)"
      GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly digest
        id: run
        run: |
          ARGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then ARGS="$ARGS --dry-run"; fi
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then ARGS="$ARGS --force"; fi
          echo "Running: python -m src.main $ARGS"
          python -m src.main $ARGS

      - name: Show agent costs (if any)
        if: always()
        run: |
          set -e
          LATEST=$(ls -1 data/decisions/*.json 2>/dev/null | tail -1 || true)
          if [[ -n "$LATEST" ]]; then
            echo "=== Latest decision: $LATEST ==="
            python -c "
          import json,sys
          d=json.load(open('$LATEST'))
          costs=d.get('agent_costs_usd',{})
          print('Agent costs USD:', json.dumps(costs, indent=2))
          print('Degraded signals:', d.get('degraded_signals'))
          print('Executed trades:', len(d.get('executed_trades') or []))
          print('Skipped:', len(d.get('skipped') or []))
          "
          else
            echo "(no decision file produced)"
          fi

      - name: Commit data/ snapshot
        if: always() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "minihedgefund-bot"
          git config user.email "bot@minihedgefund.invalid"
          if [[ -n "$(git status --porcelain data/ 2>/dev/null)" ]]; then
            git add data/
            git commit -m "data: weekly snapshot $(date -u +%Y-%m-%d) [skip ci]"
            # Retry push once if remote moved between checkout and now
            git push || (git pull --rebase origin main && git push)
            echo "Committed data/ snapshot"
          else
            echo "No data/ changes to commit"
          fi

      - name: Notify Discord on workflow-level failure
        if: failure()
        run: |
          # Fallback for failures the Python error-handler couldn't catch
          # (e.g. install step failed, runner OOM'd, etc.).
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "No webhook configured — skipping failure notification"
            exit 0
          fi
          BODY=$(cat <<EOF
          {
            "embeds": [{
              "title": "❌ MiniHedgeFund — workflow failed",
              "description": "Workflow [run #${{ github.run_id }}](${GH_RUN_URL}) failed at a step Python could not recover from.",
              "color": 13382451
            }]
          }
          EOF
          )
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$BODY" || true
